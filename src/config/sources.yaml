# Data source configuration for continuous mode
# schedule: cron expression (APScheduler format)
# enabled: whether to run in continuous mode
# collector: Python class path

sources:
  dgis_suppliers:
    collector: src.collectors.suppliers.dgis.DgisSupplierCollector
    schedule: "0 0 */3 * *"  # Every 3 days
    enabled: true
    description: "2GIS supplier directory (92 cities)"

  hespareparts:
    collector: src.collectors.parts.hespareparts.HesparepartsCollector
    schedule: "0 0 * * 0"  # Weekly on Sunday
    enabled: true
    description: "HeSpareParts aftermarket catalog (15 brands)"

  exkavator:
    collector: src.collectors.suppliers.exkavator.ExkavatorCollector
    schedule: "0 0 */7 * *"  # Weekly
    enabled: true
    description: "Exkavator.ru ads + companies (156 subcategories)"

